name: Build OpenWrt 25.12.3 (PR #22201 + All Packages) for JioRouter AX6000

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *'

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_VERSION: v25.12.3
  PR_NUMBER: 22201
  BUILD_DIR: openwrt
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc g++ make libncurses-dev zlib1g-dev \
            gawk gettext libssl-dev xsltproc zip file subversion jq tar bzip2 unzip \
            wget git rsync python3 python3-setuptools

      - name: Clone OpenWrt and checkout v25.12.3
        run: |
          git clone ${{ env.OPENWRT_REPO }} ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          git checkout ${{ env.OPENWRT_VERSION }}

      - name: Apply PR #22201
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          git fetch origin pull/${{ env.PR_NUMBER }}/head:pr${{ env.PR_NUMBER }}
          git checkout pr${{ env.PR_NUMBER }}


      - name: Patch model name in DTS
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          DTS="target/linux/mediatek/dts/mt7986a-jiorouter-ax6000-jidu6101.dts"
          DTSI="target/linux/mediatek/dts/mt7986a-jiorouter-common.dtsi"
          for FILE in "$DTS" "$DTSI"; do
            if [ -f "$FILE" ]; then
              sed -i 's/model = "[^"]*"/model = "JioRouter AX6000 (ManavRajIN Build)"/' "$FILE"
              echo "Patched: $FILE"
              grep 'model = ' "$FILE" || true
            else
              echo "Not found: $FILE"
            fi
          done

      - name: Bake WiFi and LED config into firmware
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/config

          # Permanent WiFi default - survives factory reset
          # User can change SSID/password later via LuCI
          cat > files/etc/config/wireless << 'WEOF'
config wifi-device 'radio0'
        option type 'mac80211'
        option band '2g'
        option disabled '0'

config wifi-iface 'default_radio0'
        option device 'radio0'
        option mode 'ap'
        option ssid 'ManavRajIN Network'
        option encryption 'none'
        option disabled '0'

config wifi-device 'radio1'
        option type 'mac80211'
        option band '5g'
        option disabled '0'

config wifi-iface 'default_radio1'
        option device 'radio1'
        option mode 'ap'
        option ssid 'ManavRajIN Network'
        option encryption 'none'
        option disabled '0'
WEOF

          cat > files/etc/uci-defaults/99-wifi-led.sh << 'EOF'
          #!/bin/sh
          uci set wireless.radio0.disabled=0
          uci set wireless.radio1.disabled=0
          uci commit wireless
          wifi up
          uci -q delete system.wan_red
          uci -q delete system.wan_green
          uci set system.wan_red=led
          uci set system.wan_red.name='WAN_No_Internet'
          uci set system.wan_red.sysfs='red:status'
          uci set system.wan_red.trigger='netdev'
          uci set system.wan_red.dev='wan'
          uci set system.wan_red.mode='link'
          uci set system.wan_red.default='1'
          uci set system.wan_green=led
          uci set system.wan_green.name='WAN_Internet_OK'
          uci set system.wan_green.sysfs='green:status'
          uci set system.wan_green.trigger='netdev'
          uci set system.wan_green.dev='wan'
          uci set system.wan_green.mode='link'
          uci set system.wan_green.default='0'
          uci commit system
          rm -f /etc/uci-defaults/99-wifi-led.sh
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-wifi-led.sh

      - name: Generate .config (target + all packages from your list)
        working-directory: ${{ env.BUILD_DIR }}
