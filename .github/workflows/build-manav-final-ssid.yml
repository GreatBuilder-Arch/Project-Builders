      - name: Update and install feeds
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/dl
            ${{ env.BUILD_DIR }}/build_dir/target-*
            ${{ env.BUILD_DIR }}/staging_dir/target-*
            ${{ env.BUILD_DIR }}/tmp/.build
          key: openwrt-${{ env.OPENWRT_VERSION }}-pr${{ env.PR_NUMBER }}-${{ hashFiles('${{ env.BUILD_DIR }}/.config') }}
          restore-keys: |
            openwrt-${{ env.OPENWRT_VERSION }}-pr${{ env.PR_NUMBER }}-
            openwrt-${{ env.OPENWRT_VERSION }}-

      - name: Build firmware
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          make -j$(nproc) download
          make -j$(nproc) V=s

      - name: Prepare artifacts
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          mkdir -p artifacts
          find bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.tar.gz" -o -name "*.itb" -o -name "*.elf" \) -exec cp {} artifacts/ \;
          cp .config artifacts/config.txt
          echo "BUILD_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jiorouter_ax6000-${{ env.BUILD_DATE }}
          path: ${{ env.BUILD_DIR }}/artifacts/
          retention-days: 30
          compression-level: 9