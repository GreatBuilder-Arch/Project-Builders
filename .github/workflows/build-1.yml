name: OpenWrt Build JIDU6101

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget qemu-utils

      - name: Fetch PR 22201 (JIDU6101 Support)
        run: |
          git fetch origin pull/22201/head:pr-22201
          git cherry-pick pr-22201

      - name: Update Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Remove Broken Packages
        run: |
          ./scripts/feeds uninstall onionshare-cli || true

      - name: Add Config
