          EOF
          make defconfig



      - name: Bake WiFi and LED config into firmware
        run: |
          mkdir -p openwrt/files/etc/uci-defaults
          printf '%s\n' \
            '#!/bin/sh' \
            'uci set wireless.radio0.disabled=0' \
            'uci set wireless.radio1.disabled=0' \
            'uci commit wireless' \
            'wifi up' \
            'uci -q delete system.wan_red' \
            'uci -q delete system.wan_green' \
            'uci set system.wan_red=led' \
            'uci set system.wan_red.name=WAN_No_Internet' \
            'uci set system.wan_red.sysfs=red:status' \
            'uci set system.wan_red.trigger=netdev' \
            'uci set system.wan_red.dev=wan' \
            'uci set system.wan_red.mode=link' \
            'uci set system.wan_red.default=1' \
            'uci set system.wan_green=led' \
            'uci set system.wan_green.name=WAN_Internet_OK' \
            'uci set system.wan_green.sysfs=green:status' \
            'uci set system.wan_green.trigger=netdev' \
            'uci set system.wan_green.dev=wan' \
            'uci set system.wan_green.mode=link' \
            'uci set system.wan_green.default=0' \
            'uci commit system' \
            'rm -f /etc/uci-defaults/99-wifi-led.sh' \
            'exit 0' \
            > openwrt/files/etc/uci-defaults/99-wifi-led.sh
          chmod +x openwrt/files/etc/uci-defaults/99-wifi-led.sh

      - name: Download Sources
        run: make download -j8 || make download -j1

      - name: Build Firmware
        run: make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: JIDU6101-firmware
          path: |
            bin/targets/mediatek/filogic/*.bin
            bin/targets/mediatek/filogic/*.itb
            bin/targets/mediatek/filogic/sha256sums
          retention-days: 7
