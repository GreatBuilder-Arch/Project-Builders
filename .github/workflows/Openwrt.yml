name: OpenWrt Build JIDU6101

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget

      # ── Clone OpenWrt stable v25.12.3 + device files from PR #22201 ──────
      - name: Clone OpenWrt and apply PR 22201 device files
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v25.12.3
          git fetch origin pull/22201/head:pr22201

          # Copy DTS files
          git checkout pr22201 -- \
            target/linux/mediatek/dts/mt7986a-jiorouter-ax6000-jidu6101.dts \
            target/linux/mediatek/dts/mt7986a-jiorouter-common.dtsi

          # Show what filogic files exist in PR
          echo "=== Files in PR filogic ==="
          git show pr22201 --name-only | grep filogic || true

          # Copy all new/changed filogic files from PR
          git diff v25.12.3..pr22201 --name-only | grep filogic | while read f; do
            git checkout pr22201 -- "$f" 2>/dev/null && echo "Copied: $f" || true
          done

          # Verify DTS
          ls target/linux/mediatek/dts/mt7986a-jiorouter* || \
            { echo "ERROR: DTS files missing!"; exit 1; }

          # Check profile (warn only, don't fail)
          grep -r "jiorouter" target/linux/mediatek/filogic/ && \
            echo "Device profile OK" || \
            echo "WARNING: Profile not found, defconfig will handle it"

      - name: Update Feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Remove Broken Packages
        working-directory: openwrt
        run: |
          ./scripts/feeds uninstall onionshare-cli || true

      - name: Add Config
        working-directory: openwrt
        run: |
          rm -f .config
          echo 'CONFIG_TARGET_mediatek=y' >> .config
          echo 'CONFIG_TARGET_mediatek_filogic=y' >> .config
          echo 'CONFIG_TARGET_mediatek_filogic_DEVICE_jiorouter_ax6000-jidu6101=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
