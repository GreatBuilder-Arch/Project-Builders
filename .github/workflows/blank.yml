          CONFIG_PACKAGE_kmod-crypto-sha256=y
          CONFIG_PACKAGE_kmod-crypto-sha3=y
          CONFIG_PACKAGE_kmod-crypto-sha512=y
          CONFIG_PACKAGE_kmod-crypto-xxhash=y

          # Kernel modules - filesystems
          CONFIG_PACKAGE_kmod-fs-autofs4=y
          CONFIG_PACKAGE_kmod-fs-btrfs=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y

          # Kernel modules - tunnels & networking
          CONFIG_PACKAGE_kmod-fou=y
          CONFIG_PACKAGE_kmod-fou6=y
          CONFIG_PACKAGE_kmod-geneve=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-gre=y
          CONFIG_PACKAGE_kmod-gre6=y
          CONFIG_PACKAGE_kmod-hwmon-core=y
          CONFIG_PACKAGE_kmod-i2c-core=y
          CONFIG_PACKAGE_kmod-ifb=y
