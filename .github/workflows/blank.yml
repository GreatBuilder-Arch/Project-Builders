          CONFIG_PACKAGE_libpthread=y
          CONFIG_PACKAGE_librt=y
          CONFIG_PACKAGE_libsmartcols1=y
          CONFIG_PACKAGE_libsqlite3-0=y
          CONFIG_PACKAGE_libss2=y
          CONFIG_PACKAGE_libubox20251208=y
          CONFIG_PACKAGE_libubox20260213=y
          CONFIG_PACKAGE_libubus20251202=y
          CONFIG_PACKAGE_libuci20250120=y
          CONFIG_PACKAGE_libuclient20201210=y
          CONFIG_PACKAGE_libucode20230711=y
          CONFIG_PACKAGE_libudebug=y
          CONFIG_PACKAGE_libusb-1.0-0=y
          CONFIG_PACKAGE_libustream-openssl20201210=y
          CONFIG_PACKAGE_libuuid1=y
          CONFIG_PACKAGE_libwebp=y
          CONFIG_PACKAGE_libxtables12=y
          EOF

      # ── 8. Expand config (defconfig) ──────────────────────────────────────
      - name: Expand .config with defaults
        working-directory: openwrt
        run: make defconfig

      # ── 9. Download sources (parallel) ────────────────────────────────────
      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) || make download -j1 V=s

      # ── 10. Build toolchain + firmware ────────────────────────────────────
      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) || {
            echo "Parallel build failed — retrying single-threaded..."
            make -j1 V=s 2>&1 | tail -50
            exit 1
          }

      # ── 11. Collect output files ───────────────────────────────────────────
      - name: Collect firmware artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/targets/mediatek/filogic/ \
            -name "*jiorouter*" \( -name "*.bin" -o -name "*.manifest" \) \
            -exec cp {} artifacts/ \;
          echo "--- Built files ---"
          ls -lh artifacts/

      # ── 12. Upload as GitHub artifact ─────────────────────────────────────
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12.4-jiorouter-ax6000-jidu6101
          path: artifacts/
          retention-days: 30

      # ── 13. (Optional) Create GitHub Release on tag push ──────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## OpenWrt 25.12.4 — JioRouter AX6000 JIDU6101
            Built from OpenWrt v25.12.4 + PR #22201

            ### Flash Instructions
            **First time (TFTP + UART):**
            Use `*-initramfs-kernel.bin` via TFTP boot

            **Upgrade from existing OpenWrt:**
            Use `*-squashfs-sysupgrade.bin` via LuCI or sysupgrade

            ### Included Features
            - WireGuard VPN + LuCI UI
            - SQM QoS (CAKE)
            - MWAN3 Multi-WAN
            - nlbwmon + vnstat2 bandwidth monitoring
            - Full USB support (3G/4G modems, storage)
            - LuCI web interface
