          CONFIG_PACKAGE_libblobmsg-json20251208=y
          CONFIG_PACKAGE_libblobmsg-json20260213=y
          CONFIG_PACKAGE_libc=y
          CONFIG_PACKAGE_libcomerr0=y
          CONFIG_PACKAGE_libe2p2=y
          CONFIG_PACKAGE_libext2fs2=y
          CONFIG_PACKAGE_libf2fs6=y
          CONFIG_PACKAGE_libgcc1=y
          CONFIG_PACKAGE_libgd=y
          CONFIG_PACKAGE_libiperf3=y
          CONFIG_PACKAGE_libipset13=y
          CONFIG_PACKAGE_libiwinfo-data=y
          CONFIG_PACKAGE_libiwinfo20230701=y
          CONFIG_PACKAGE_libjpeg-turbo=y
          CONFIG_PACKAGE_libjson-c5=y
          CONFIG_PACKAGE_libjson-script20251208=y
          CONFIG_PACKAGE_libjson-script20260213=y
          CONFIG_PACKAGE_liblua5.1.5=y
          CONFIG_PACKAGE_liblucihttp-ucode=y
          CONFIG_PACKAGE_liblucihttp0=y
          CONFIG_PACKAGE_libmbedtls21=y
          CONFIG_PACKAGE_libmnl0=y
          CONFIG_PACKAGE_libmount1=y
          CONFIG_PACKAGE_libncurses6=y
          CONFIG_PACKAGE_libnftnl11=y
          CONFIG_PACKAGE_libnl-tiny1=y
          CONFIG_PACKAGE_libopenssl3=y
          CONFIG_PACKAGE_libopenssl-conf=y
          CONFIG_PACKAGE_libopenssl-legacy=y
          CONFIG_PACKAGE_libpng=y
          CONFIG_PACKAGE_libpthread=y
          CONFIG_PACKAGE_librt=y
          CONFIG_PACKAGE_libsmartcols1=y
          CONFIG_PACKAGE_libsqlite3-0=y
          CONFIG_PACKAGE_libss2=y
          CONFIG_PACKAGE_libubox20251208=y
          CONFIG_PACKAGE_libubox20260213=y
          CONFIG_PACKAGE_libubus20251202=y
          CONFIG_PACKAGE_libuci20250120=y
          CONFIG_PACKAGE_libuclient20201210=y
          CONFIG_PACKAGE_libucode20230711=y
          CONFIG_PACKAGE_libudebug=y
          CONFIG_PACKAGE_libusb-1.0-0=y
          CONFIG_PACKAGE_libustream-openssl20201210=y
          CONFIG_PACKAGE_libuuid1=y
          CONFIG_PACKAGE_libwebp=y
          CONFIG_PACKAGE_libxtables12=y
          EOF

      # ------------------------------------------------------------------ #
      # 6. Bake WiFi and LED config into firmware via uci-defaults
      # ------------------------------------------------------------------ #
      - name: Bake WiFi and LED config into firmware
        run: |
          mkdir -p openwrt/files/etc/uci-defaults
          cat > openwrt/files/etc/uci-defaults/99-wifi-led.sh << 'SCRIPT'
          #!/bin/sh
          uci set wireless.radio0.disabled=0
          uci set wireless.radio1.disabled=0
          uci commit wireless
          wifi up
          uci -q delete system.wan_red
          uci set system.wan_red=led
          uci set system.wan_red.name='WAN_No_Internet'
          uci set system.wan_red.sysfs='red:status'
          uci set system.wan_red.trigger='netdev'
          uci set system.wan_red.dev='wan'
          uci set system.wan_red.mode='link'
          uci set system.wan_red.default='1'
          uci -q delete system.wan_green
          uci set system.wan_green=led
          uci set system.wan_green.name='WAN_Internet_OK'
          uci set system.wan_green.sysfs='green:status'
          uci set system.wan_green.trigger='netdev'
          uci set system.wan_green.dev='wan'
          uci set system.wan_green.mode='link'
          uci set system.wan_green.default='0'
          uci commit system
          rm -f /etc/uci-defaults/99-wifi-led.sh
          exit 0
          SCRIPT
          chmod +x openwrt/files/etc/uci-defaults/99-wifi-led.sh

      # ------------------------------------------------------------------ #
      # 7. defconfig expansion
      # ------------------------------------------------------------------ #
      - name: Expand .config (defconfig)
        working-directory: openwrt
        run: make defconfig

      # ------------------------------------------------------------------ #
      # 8. Download package sources
      # ------------------------------------------------------------------ #
      - name: Download package sources
        working-directory: openwrt
        run: make download -j$(nproc) || make download -j1 V=s

      # ------------------------------------------------------------------ #
      # 9. Compile firmware
      # ------------------------------------------------------------------ #
      - name: Compile firmware
        working-directory: openwrt
        run: make -j$(nproc) || make -j1 V=s
        env:
          IGNORE_ERRORS: 1

      # ------------------------------------------------------------------ #
      # 10. List build artifacts
      # ------------------------------------------------------------------ #
      - name: List build outputs
        run: |
          echo "=== Firmware images ==="
          find openwrt/bin/targets -type f | sort

      # ------------------------------------------------------------------ #
      # 11. Upload artifacts
      # ------------------------------------------------------------------ #
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.PROFILE }}
          path: |
            openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin
            openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.itb
            openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*sysupgrade*
            openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*factory*
            openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/sha256sums
          if-no-files-found: warn
          retention-days: 30
