name: Build OpenWrt for JioRouter AX6000 JIDU6101

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Clone directly from the PR author's fork branch — no merge needed
  PR_REPO: https://github.com/sh3ikh-faisal/openwrt.git
  PR_BRANCH: jirouter-ax6000
  # Pinned to the latest reviewed commit on that branch
  PR_COMMIT: 4f43eeec063b9df896cc8fac12a954881b556130
  TARGET: mediatek
  SUBTARGET: filogic
  PROFILE: jiorouter_ax6000-jidu6101

jobs:
  build:
    name: Build OpenWrt (MediaTek Filogic / JIDU6101)
    runs-on: ubuntu-24.04
    steps:

      # ------------------------------------------------------------------ #
      # 1. Free up disk space
      # ------------------------------------------------------------------ #
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          df -h

      # ------------------------------------------------------------------ #
      # 2. Install build dependencies
      # ------------------------------------------------------------------ #
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl ca-certificates

      # ------------------------------------------------------------------ #
      # 3. Clone PR author's fork at the pinned commit
      #    This branch already has the JIDU6101 device files — no merge needed
      # ------------------------------------------------------------------ #
      - name: Clone OpenWrt fork (PR #22201)
        run: |
          git clone --depth=1 --branch "$PR_BRANCH" "$PR_REPO" openwrt
          cd openwrt
          git checkout "$PR_COMMIT"

      # ------------------------------------------------------------------ #
      # 4. Update feeds
      # ------------------------------------------------------------------ #
      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ------------------------------------------------------------------ #
      # 5. Write .config
      # ------------------------------------------------------------------ #
      - name: Write .config
        working-directory: openwrt
        run: |
          # ---------- Target ----------
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_jiorouter_ax6000-jidu6101=y
          EOF

          # ---------- Base / system packages ----------
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_busybox=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_cgi-io=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_f2fsck=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_fwtool=y
          CONFIG_PACKAGE_getrandom=y
          CONFIG_PACKAGE_hostapd-common=y
          CONFIG_PACKAGE_ip-tiny=y
          CONFIG_PACKAGE_ip6tables-nft=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_iptables-mod-conntrack-extra=y
