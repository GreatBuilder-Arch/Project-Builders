name: OpenWrt 25.12.4 - JioRouter AX6000 JIDU6101

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build:
    name: Build JioRouter AX6000 JIDU6101
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # ── 1. Free up disk space ──────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          df -h

      # ── 2. Install build dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync unzip zlib1g-dev file wget \
            python3 python3-pip qemu-utils libelf-dev

      # ── 3. Clone OpenWrt 25.12.4 ──────────────────────────────────────────
      - name: Clone OpenWrt source (v25.12.4)
        run: |
          git clone --depth 1 --branch v25.12.4 \
            https://git.openwrt.org/openwrt/openwrt.git openwrt
          echo "OpenWrt version: $(cat openwrt/package/base-files/files/etc/openwrt_release | grep DISTRIB_RELEASE | cut -d= -f2)"

      # ── 4. Apply PR #22201 (JioRouter AX6000 device support) ──────────────
      - name: Apply PR #22201 - JioRouter AX6000 device support
        working-directory: openwrt
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          # Fetch the PR branch from the author's fork and merge,
          # preferring PR changes on any conflict (-X theirs)
          git fetch https://github.com/sh3ikh-faisal/openwrt.git jirouter-ax6000
          git merge --no-edit -X theirs --allow-unrelated-histories FETCH_HEAD
          echo "PR #22201 applied successfully"

      # ── 5. Cache feeds and tools ──────────────────────────────────────────
      - name: Cache feeds
        if: inputs.clean_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/feeds
            openwrt/staging_dir/host
            openwrt/staging_dir/hostpkg
          key: openwrt-25.12.4-feeds-${{ runner.os }}-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            openwrt-25.12.4-feeds-${{ runner.os }}-

      # ── 6. Update & install feeds ─────────────────────────────────────────
      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── 7. Write .config ──────────────────────────────────────────────────
      - name: Write .config
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          # Target
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_jiorouter_ax6000-jidu6101=y

          # Base packages
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_blockd=y
          CONFIG_PACKAGE_busybox=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_cgi-io=y
          CONFIG_PACKAGE_dnsmasq=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_f2fsck=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_fwtool=y
          CONFIG_PACKAGE_getrandom=y
          CONFIG_PACKAGE_hostapd-common=y
          CONFIG_PACKAGE_ip-tiny=y
          CONFIG_PACKAGE_ip6tables-nft=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_iptables-mod-conntrack-extra=y
          CONFIG_PACKAGE_iptables-mod-extra=y
          CONFIG_PACKAGE_iptables-mod-ipopt=y
          CONFIG_PACKAGE_iptables-nft=y
          CONFIG_PACKAGE_iw=y
          CONFIG_PACKAGE_jshn=y
          CONFIG_PACKAGE_jsonfilter=y
          CONFIG_PACKAGE_kernel=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mkf2fs=y
          CONFIG_PACKAGE_mount-utils=y
          CONFIG_PACKAGE_mtd=y
